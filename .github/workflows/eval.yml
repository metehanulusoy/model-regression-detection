name: Regression Eval

on:
  pull_request:
    paths:
      - "prompts/**"
      - "golden/**"
      - "src/**"
      - ".github/workflows/eval.yml"
  workflow_dispatch:
    inputs:
      prompt:
        description: "Prompt name to evaluate"
        required: true
        default: "customer_support"
      dataset:
        description: "Path to golden dataset"
        required: true
        default: "golden/customer_support.jsonl"

permissions:
  contents: read
  pull-requests: write

jobs:
  eval:
    name: Run regression eval
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Restore eval DB cache
        uses: actions/cache@v4
        with:
          path: mrd.sqlite3
          key: mrd-db-${{ github.event.repository.default_branch }}-${{ github.run_id }}
          restore-keys: |
            mrd-db-${{ github.event.repository.default_branch }}-

      - name: Run eval
        env:
          MRD_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          MRD_SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          MRD_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MRD_GITHUB_REPOSITORY: ${{ github.repository }}
          MRD_GITHUB_PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          mrd run \
            --prompt "${{ github.event.inputs.prompt || 'customer_support' }}" \
            --dataset "${{ github.event.inputs.dataset || 'golden/customer_support.jsonl' }}" \
            --baseline auto \
            --report-dir reports \
            --git-sha "${{ github.sha }}" \
            --git-branch "${{ github.head_ref || github.ref_name }}" \
            --pr-number "${{ github.event.pull_request.number || 0 }}"

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-report
          path: reports/
          if-no-files-found: ignore
